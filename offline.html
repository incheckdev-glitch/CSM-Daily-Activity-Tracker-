<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #020617;
      --card: #0b1120;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 58%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: color-mix(in oklab, var(--card) 92%, black 8%);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 16px 38px rgba(2, 6, 23, 0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(37, 99, 235, 0.45);
      color: #c7d2fe;
      background: rgba(37, 99, 235, 0.18);
      margin-bottom: 12px;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-live="polite">
    <span class="badge" id="offlineAppName">App</span>
    <h1>You're currently offline</h1>
    <p id="offlineMessage">You are offline. Please reconnect to continue using the app.</p>
  </main>
  <script src="/white-label.config.js"></script>
  <script>
    const brand = window.WHITE_LABEL_CONFIG || {};
    const appName = brand.appName || 'App';
    document.title = `Offline • ${appName}`;
    const badge = document.getElementById('offlineAppName');
    if (badge) badge.textContent = appName;
    const message = document.getElementById('offlineMessage');
    if (message) message.textContent = `You are offline. Please reconnect to continue using ${appName}.`;
  </script>
</body>
</html>
